<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M'ARC Bus Gratuits</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Empêche de scroller pour voir la barre cachée */
            background-color: #ffffff; 
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            /* L'ASTUCE : On remonte l'iframe de 40 pixels pour cacher la barre de titre */
            top: -38px; 
            left: 0;
            width: 100%;
            /* On rajoute ces 38px en bas pour ne pas perdre le bas du widget */
            height: calc(100% + 38px); 
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://grist.numerique.gouv.fr/o/docs/38bVq7YXzemR/MARC-Bus-public/p/19?embed=true" 
            allow="clipboard-read; clipboard-write"
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
